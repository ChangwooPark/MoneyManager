name: Deploy (Development)

on:
  push:
    branches:
      - develop   # develop 브랜치 push 시에만 실행

jobs:
  # ─── 백엔드: 개발 Cloud Run 배포 ─────────────────────────────────
  # 운영과 동일한 구조이나 개발용 GCP 프로젝트와 Cloud Run 서비스를 사용합니다.
  # GCP_DEV_SA_KEY: 개발 프로젝트의 Service Account 키 (GitHub Secret)
  # GCP_DEV_PROJECT_ID: money-manager-dev-001
  deploy-backend:
    name: Deploy Backend to Cloud Run (Dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEV_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_DEV_PROJECT_ID }}/money-manager-dev/account-book:${{ github.sha }}
          docker build -t $IMAGE MoneyManager/
          docker push $IMAGE

      - name: Deploy to Cloud Run (Dev)
        run: |
          IMAGE=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_DEV_PROJECT_ID }}/money-manager-dev/account-book:${{ github.sha }}
          gcloud run deploy money-manager-dev \
            --image=$IMAGE \
            --region=asia-northeast3 \
            --platform=managed \
            --allow-unauthenticated \
            --max-instances=1 \
            --port=8080 \
            --update-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
            --project=${{ secrets.GCP_DEV_PROJECT_ID }}

  # ─── 프론트엔드: Vercel 개발 고정 URL 배포 ──────────────────────
  # --prod 없이 배포 후 vercel alias로 고정 URL(frontend-dev-changwoo-park.vercel.app)을
  # 최신 배포에 연결합니다. develop push마다 같은 URL이 갱신됩니다.
  # NEXT_PUBLIC_API_URL은 개발 백엔드 URL을 가리킵니다.
  deploy-frontend:
    name: Deploy Frontend to Vercel (Dev Fixed URL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Preview 환경 설정 pull
      - name: Pull Vercel project settings
        working-directory: MoneyManager/frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_C6F9p19SH8pOyJxy7x8OtS82
          VERCEL_PROJECT_ID: prj_5TOJOfymglx2pWt2aQXTDc0B909g

      # 개발 백엔드 URL을 주입하여 빌드
      - name: Build project
        working-directory: MoneyManager/frontend
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_C6F9p19SH8pOyJxy7x8OtS82
          VERCEL_PROJECT_ID: prj_5TOJOfymglx2pWt2aQXTDc0B909g
          NEXT_PUBLIC_API_URL: https://money-manager-dev-576447610294.asia-northeast3.run.app

      # 배포 후 고정 alias 적용 — develop push마다 동일한 URL이 최신 빌드를 가리킴
      - name: Deploy and alias to fixed dev URL
        working-directory: MoneyManager/frontend
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          vercel alias set $DEPLOY_URL frontend-dev-changwoo-park.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_C6F9p19SH8pOyJxy7x8OtS82
          VERCEL_PROJECT_ID: prj_5TOJOfymglx2pWt2aQXTDc0B909g
